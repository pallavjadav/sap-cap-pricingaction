_schema-version: 3.3.0
ID: pricingaction
description: A simple CAP project.
version: 1.0.0
modules:
  - name: pricingaction-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: pricingaction-auth
      - name: pricingaction-db
      - name: pricingaction-destination
      - name: pricingaction-logging
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: pricingaction-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: pricingaction-db
    parameters:
      buildpack: nodejs_buildpack
  - name: pricingaction-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: pricingaction-auth
      - name: srv-api
      - name: pricingaction-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - pricingaction.zip
          name: pricingaction
          target-path: app/
  - name: pricingaction
    type: html5
    path: app/pricingaction
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: pricingaction-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: pricingaction-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: pricingaction-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: pricingaction-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
  - name: pricingaction-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: pricingaction-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: standard
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
